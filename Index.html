<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Notes Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
    margin-top:0;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.btn-login{
    background:#007bff;
    color:white;
}

.btn-save{
    background:green;
    color:white;
}

.btn-delete{
    background:red;
    color:white;
}

.btn-logout{
    background:#555;
    color:white;
    float:right;
}

.note{
    background:#fff;
    padding:15px;
    border-radius:8px;
    margin-top:10px;
    box-shadow:0 1px 5px rgba(0,0,0,.1);
}

.date{
    color:#666;
    font-size:12px;
}

.hidden{
    display:none;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

</head>
<body>

<div class="container">

    <div id="loginPage" class="card">
        <h2>Login</h2>

        <label>Email Address</label>
        <input type="email" id="username" placeholder="email@example.com">

        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters">

        <button class="btn-login" id="loginBtn" onclick="login()">Login / Sign Up</button>

        <p id="loginError" style="color:red;"></p>
    </div>

    <div id="notesPage" class="hidden">

        <div class="card">
            <button class="btn-logout" onclick="logout()">Logout</button>

            <h2>My Notes</h2>

            <textarea id="noteText" rows="5" placeholder="Write your note..."></textarea>

            <button class="btn-save" onclick="saveNote()">Save Note</button>
        </div>

        <div id="notesList"></div>

    </div>

</div>

<script>
// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyA64vdoHP0erE9ezpsnnHDt27dxLqkFQk8",
  authDomain: "notes-a3af6.firebaseapp.com",
  projectId: "notes-a3af6",
  storageBucket: "notes-a3af6.firebasestorage.app",
  messagingSenderId: "549289999563",
  appId: "1:549289999563:web:9a0beb595ef6b4789a2f4e",
  measurementId: "G-X5D9TJ5V4Z"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubscribeNotes = null;

// Track Auth State changes (Handles persistent login automatically)
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("notesPage").classList.remove("hidden");
        clearLoginFields();
        listenToNotes(); // Start real-time sync
    } else {
        currentUser = null;
        if(unsubscribeNotes) unsubscribeNotes(); // Stop listening on logout
        document.getElementById("notesPage").classList.add("hidden");
        document.getElementById("loginPage").classList.remove("hidden");
        document.getElementById("notesList").innerHTML = "";
    }
});

// Login or automatically create an account if user doesn't exist
function login(){
    let email = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value;
    let loginBtn = document.getElementById("loginBtn");
    let errorMsg = document.getElementById("loginError");

    if(!email || !pass) {
        errorMsg.innerText = "Please fill in all fields.";
        return;
    }

    errorMsg.innerText = "";
    loginBtn.disabled = true;

    // Attempt to login
    auth.signInWithEmailAndPassword(email, pass)
    .catch(error => {
        // If user not found, try to register them automatically
        if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
            return auth.createUserWithEmailAndPassword(email, pass);
        } else {
            throw error;
        }
    })
    .catch(err => {
        errorMsg.innerText = err.message;
        loginBtn.disabled = false;
    });
}

function logout(){
    auth.signOut();
}

function clearLoginFields() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("loginError").innerText = "";
    document.getElementById("loginBtn").disabled = false;
}

// Save note to Firestore under the logged-in user's collection
function saveNote(){
    let text = document.getElementById("noteText").value.trim();

    if(text === ""){
        alert("Please write a note.");
        return;
    }

    if(!currentUser) return;

    db.collection("users").doc(currentUser.uid).collection("notes").add({
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        document.getElementById("noteText").value = "";
    })
    .catch(error => {
        console.error("Error adding note: ", error);
        alert("Failed to save note.");
    });
}

// Delete note from Firestore
function deleteNote(docId){
    if(!currentUser) return;

    db.collection("users").doc(currentUser.uid).collection("notes").doc(docId).delete()
    .catch(error => {
        console.error("Error removing note: ", error);
    });
}

// Listen for Real-Time Database updates
function listenToNotes(){
    if(!currentUser) return;

    // Ordered by newest first based on server timestamp
    unsubscribeNotes = db.collection("users").doc(currentUser.uid).collection("notes")
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
            let html = "";
            snapshot.forEach(doc => {
                let note = doc.data();
                
                // Construct readable date format
                let displayDate = "Saving...";
                if(note.timestamp) {
                    displayDate = note.timestamp.toDate().toLocaleString();
                }

                html += `
                <div class="note">
                    <div class="date">${displayDate}</div>
                    <p>${note.text.replace(/\n/g,"<br>")}</p>
                    <button class="btn-delete" onclick="deleteNote('${doc.id}')">
                        Delete
                    </button>
                </div>`;
            });
            document.getElementById("notesList").innerHTML = html;
        }, error => {
            console.error("Snapshot listener error: ", error);
        });
}
</script>

</body>
</html>
